<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trainings Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f1117;
  --bg2: #161b27;
  --bg3: #1e2535;
  --border: rgba(255,255,255,0.08);
  --border2: rgba(255,255,255,0.15);
  --text: #e8eaf0;
  --text2: #8892a4;
  --text3: #4a5568;
  --accent: #4f9cf9;
  --accent2: #3b82f6;
  --green: #34d399;
  --green-bg: rgba(52,211,153,0.1);
  --red: #f87171;
  --red-bg: rgba(248,113,113,0.1);
  --amber: #fbbf24;
  --amber-bg: rgba(251,191,36,0.1);
  --mono: 'DM Mono', monospace;
  --sans: 'DM Sans', sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 15px; }
body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; }
.app { display: grid; grid-template-columns: 260px 1fr; min-height: 100vh; }
.sidebar { background: var(--bg2); border-right: 1px solid var(--border); padding: 24px 0; position: sticky; top: 0; height: 100vh; overflow-y: auto; display: flex; flex-direction: column; }
.main { padding: 32px; overflow-x: hidden; }
.logo { padding: 0 24px 24px; border-bottom: 1px solid var(--border); margin-bottom: 8px; }
.logo h1 { font-family: var(--mono); font-size: 13px; font-weight: 500; color: var(--accent); letter-spacing: 0.05em; text-transform: uppercase; }
.logo p { font-size: 11px; color: var(--text3); margin-top: 4px; font-family: var(--mono); }
.user-list { padding: 8px 12px; flex: 1; }
.user-btn { width: 100%; text-align: left; background: none; border: none; cursor: pointer; padding: 10px 12px; border-radius: 8px; transition: background 0.15s; display: flex; align-items: center; gap: 10px; margin-bottom: 2px; }
.user-btn:hover { background: var(--bg3); }
.user-btn.active { background: rgba(79,156,249,0.12); }
.user-avatar { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; font-family: var(--mono); flex-shrink: 0; }
.user-info { flex: 1; min-width: 0; }
.user-name { font-size: 13px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.user-meta { font-size: 11px; color: var(--text3); font-family: var(--mono); }
.user-status { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.sidebar-actions { padding: 12px; border-top: 1px solid var(--border); }
.btn-add-user { width: 100%; background: none; border: 1px dashed var(--border2); color: var(--text2); border-radius: 8px; padding: 10px; font-size: 13px; cursor: pointer; font-family: var(--sans); transition: all 0.15s; }
.btn-add-user:hover { border-color: var(--accent); color: var(--accent); background: rgba(79,156,249,0.05); }
.tabs { display: flex; gap: 2px; background: var(--bg2); border-radius: 10px; padding: 3px; margin-bottom: 28px; width: fit-content; }
.tab { padding: 7px 18px; border-radius: 8px; border: none; background: none; color: var(--text2); font-size: 13px; font-family: var(--sans); cursor: pointer; transition: all 0.15s; font-weight: 500; }
.tab.active { background: var(--bg3); color: var(--text); }
.tab:hover:not(.active) { color: var(--text); }
.kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 28px; }
.kpi { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 18px 20px; }
.kpi-label { font-size: 11px; color: var(--text3); font-family: var(--mono); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px; }
.kpi-value { font-size: 28px; font-family: var(--mono); font-weight: 500; line-height: 1; }
.kpi-sub { font-size: 11px; color: var(--text2); margin-top: 6px; }
.kpi.green { border-color: rgba(52,211,153,0.2); }
.kpi.green .kpi-value { color: var(--green); }
.kpi.red { border-color: rgba(248,113,113,0.2); }
.kpi.red .kpi-value { color: var(--red); }
.kpi.amber { border-color: rgba(251,191,36,0.2); }
.kpi.amber .kpi-value { color: var(--amber); }
.kpi.blue { border-color: rgba(79,156,249,0.2); }
.kpi.blue .kpi-value { color: var(--accent); }
.progress-wrap { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 18px 20px; margin-bottom: 28px; }
.progress-label { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.progress-label span { font-size: 12px; color: var(--text2); font-family: var(--mono); }
.progress-bar-bg { height: 6px; background: var(--bg3); border-radius: 3px; overflow: hidden; }
.progress-bar-fill { height: 100%; border-radius: 3px; transition: width 0.6s cubic-bezier(0.4,0,0.2,1); background: linear-gradient(90deg, var(--accent2), var(--accent)); }
.progress-markers { display: flex; justify-content: space-between; margin-top: 6px; }
.progress-markers span { font-size: 10px; color: var(--text3); font-family: var(--mono); }
.section-title { font-size: 12px; color: var(--text3); font-family: var(--mono); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
.section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }
.month-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
.month-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 14px; }
.month-name { font-size: 11px; font-family: var(--mono); color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
.month-badge { font-size: 10px; padding: 2px 6px; border-radius: 4px; background: var(--amber-bg); color: var(--amber); }
.month-stats { display: flex; gap: 8px; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); }
.month-stat { flex: 1; text-align: center; }
.month-stat-val { font-size: 14px; font-family: var(--mono); font-weight: 500; }
.month-stat-lbl { font-size: 9px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.05em; }
.log-table { width: 100%; border-collapse: collapse; }
.log-table th { text-align: left; padding: 8px 14px; font-size: 11px; font-family: var(--mono); color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; border-bottom: 1px solid var(--border); font-weight: 400; }
.log-table td { padding: 10px 14px; font-size: 13px; border-bottom: 1px solid var(--border); vertical-align: middle; }
.log-table tr:last-child td { border-bottom: none; }
.log-table tr:hover td { background: rgba(255,255,255,0.02); }
.badge { display: inline-flex; align-items: center; padding: 3px 8px; border-radius: 4px; font-size: 11px; font-family: var(--mono); font-weight: 500; }
.badge.lgnk { background: rgba(79,156,249,0.12); color: var(--accent); }
.badge.lgusk { background: rgba(52,211,153,0.12); color: var(--green); }
.badge.other { background: var(--bg3); color: var(--text2); }
.btn-del { background: none; border: none; color: var(--text3); cursor: pointer; font-size: 16px; padding: 2px 6px; border-radius: 4px; transition: all 0.15s; }
.btn-del:hover { background: var(--red-bg); color: var(--red); }
.log-form { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 20px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr 1fr auto; gap: 12px; align-items: end; }
.form-group { display: flex; flex-direction: column; gap: 6px; }
.form-group label { font-size: 11px; color: var(--text3); font-family: var(--mono); text-transform: uppercase; letter-spacing: 0.05em; }
.form-group input, .form-group select { background: var(--bg3); border: 1px solid var(--border2); border-radius: 8px; padding: 9px 12px; color: var(--text); font-size: 13px; font-family: var(--sans); outline: none; transition: border-color 0.15s; width: 100%; }
.form-group input:focus, .form-group select:focus { border-color: var(--accent); }
.form-group select option { background: var(--bg3); }
.btn-primary { background: var(--accent2); color: white; border: none; border-radius: 8px; padding: 9px 20px; font-size: 13px; font-family: var(--sans); font-weight: 500; cursor: pointer; transition: all 0.15s; white-space: nowrap; height: 38px; }
.btn-primary:hover { background: var(--accent); transform: translateY(-1px); }
.btn-primary:active { transform: translateY(0); }
.setup-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
.setup-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 22px; }
.setup-card h3 { font-size: 13px; font-weight: 600; margin-bottom: 16px; color: var(--text); display: flex; align-items: center; gap: 8px; }
.setup-card h3 span { font-size: 16px; }
.form-group-inline { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.day-toggles { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 4px; }
.day-toggle { position: relative; }
.day-toggle input { position: absolute; opacity: 0; width: 0; }
.day-toggle label { display: flex; align-items: center; justify-content: center; width: 36px; height: 36px; border-radius: 8px; border: 1px solid var(--border2); background: var(--bg3); color: var(--text2); font-size: 12px; font-family: var(--mono); cursor: pointer; transition: all 0.15s; }
.day-toggle input:checked + label { background: rgba(79,156,249,0.15); border-color: var(--accent); color: var(--accent); }
.ferien-list { display: flex; flex-direction: column; gap: 8px; max-height: 280px; overflow-y: auto; }
.ferien-item { display: flex; align-items: center; gap: 8px; }
.ferien-item input[type=text] { flex: 1.2; font-size: 12px; }
.ferien-item input[type=date] { flex: 1; font-size: 12px; }
.ferien-item input[type=date]::-webkit-calendar-picker-indicator { filter: invert(0.5); }
.btn-icon { background: none; border: 1px solid var(--border); border-radius: 6px; color: var(--text3); cursor: pointer; padding: 6px 8px; font-size: 14px; transition: all 0.15s; }
.btn-icon:hover { border-color: var(--red); color: var(--red); }
.btn-add-ferien { background: none; border: 1px dashed var(--border2); color: var(--text2); border-radius: 8px; padding: 8px; font-size: 12px; cursor: pointer; font-family: var(--sans); transition: all 0.15s; width: 100%; margin-top: 6px; }
.btn-add-ferien:hover { border-color: var(--accent); color: var(--accent); }
.setup-actions { display: flex; gap: 10px; margin-top: 20px; justify-content: flex-end; }
.btn-secondary { background: var(--bg3); border: 1px solid var(--border2); color: var(--text); border-radius: 8px; padding: 9px 20px; font-size: 13px; font-family: var(--sans); cursor: pointer; transition: all 0.15s; }
.btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 100; backdrop-filter: blur(4px); opacity: 0; pointer-events: none; transition: opacity 0.2s; }
.modal-overlay.open { opacity: 1; pointer-events: all; }
.modal { background: var(--bg2); border: 1px solid var(--border2); border-radius: 16px; padding: 28px; width: 480px; max-width: 90vw; }
.modal h2 { font-size: 18px; font-weight: 600; margin-bottom: 20px; }
.modal .form-group { margin-bottom: 14px; }
.modal-actions { display: flex; gap: 10px; margin-top: 20px; justify-content: flex-end; }
.cal-day { border: none; cursor: pointer; transition: transform 0.1s, filter 0.1s; }
.cal-day:hover { filter: brightness(1.08); transform: translateY(-1px); }
.cal-day:active { transform: translateY(0); }
.cal-day-details { display: flex; flex-direction: column; gap: 10px; margin-top: 14px; }
.day-log-card { background: var(--bg3); border: 1px solid var(--border); border-radius: 10px; padding: 12px; }
.day-log-meta { display: flex; justify-content: space-between; gap: 8px; margin-bottom: 6px; }
.day-log-meta strong { font-size: 13px; color: var(--text); }
.day-log-meta span { font-size: 12px; color: var(--accent); font-family: var(--mono); }
.day-log-halle { font-size: 12px; color: var(--text2); }
.training-list { display: flex; flex-direction: column; gap: 8px; }
.training-item { display: grid; grid-template-columns: 1.4fr 0.9fr 0.7fr 32px; gap: 8px; align-items: center; }
.empty { text-align: center; padding: 60px 20px; color: var(--text3); }
.empty p { font-size: 14px; margin-top: 8px; }
.no-user { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 60vh; color: var(--text3); gap: 12px; }
.no-user h2 { font-size: 24px; font-family: var(--mono); color: var(--text2); }
/* Toast notification */
.toast { position: fixed; bottom: 28px; right: 28px; background: var(--bg3); border: 1px solid rgba(52,211,153,0.4); color: var(--green); font-family: var(--mono); font-size: 13px; padding: 10px 20px; border-radius: 10px; z-index: 200; opacity: 0; transform: translateY(8px); transition: opacity 0.25s, transform 0.25s; pointer-events: none; }
.toast.show { opacity: 1; transform: translateY(0); }
[data-tip] { position: relative; }
[data-tip]:hover::after { content: attr(data-tip); position: absolute; bottom: calc(100% + 6px); left: 50%; transform: translateX(-50%); background: var(--bg3); border: 1px solid var(--border2); color: var(--text); font-size: 11px; padding: 4px 8px; border-radius: 6px; white-space: nowrap; z-index: 10; font-family: var(--mono); pointer-events: none; }
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--bg3); border-radius: 3px; }
@media (max-width: 900px) {
  .app { grid-template-columns: 1fr; }
  .sidebar { position: static; height: auto; }
  .kpi-grid { grid-template-columns: repeat(2,1fr); }
  .month-grid { grid-template-columns: repeat(2,1fr); }
  .setup-grid { grid-template-columns: 1fr; }
  .form-row { grid-template-columns: 1fr 1fr; }
}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="logo">
      <h1>Training Tracker</h1>
      <p>2026 · Bayern</p>
    </div>
    <div class="user-list" id="userList"></div>
    <div class="sidebar-actions">
      <button class="btn-add-user" onclick="openNewUserModal()">+ Neue Person hinzufügen</button>
      <button class="btn-add-user" style="margin-top:6px;border-color:rgba(248,113,113,.3);color:#f87171" onclick="resetApp()">↺ App zurücksetzen</button>
    </div>
  </aside>
  <main class="main" id="mainContent">
    <div class="no-user">
      <h2>← Person auswählen</h2>
      <p>Wähle links eine Person oder füge eine neue hinzu.</p>
    </div>
  </main>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- New User Modal -->
<div class="modal-overlay" id="newUserModal">
  <div class="modal">
    <h2>Neue Person anlegen</h2>
    <div class="form-group">
      <label>Name</label>
      <input type="text" id="nu_name" placeholder="z.B. Max Mustermann">
    </div>
    <div class="form-group">
      <label>Jahreskontingent (Stunden)</label>
      <input type="number" id="nu_kontingent" value="320" min="1">
    </div>
    <div class="form-group">
      <label>Stunden pro Session</label>
      <input type="number" id="nu_hours" value="3" min="1" max="12" step="0.5">
    </div>
    <div class="form-group">
      <label>Trainingstage</label>
      <div class="day-toggles" id="nu_days">
        <div class="day-toggle"><input type="checkbox" id="d0" value="0"><label for="d0">Mo</label></div>
        <div class="day-toggle"><input type="checkbox" id="d1" value="1"><label for="d1">Di</label></div>
        <div class="day-toggle"><input type="checkbox" id="d2" value="2"><label for="d2">Mi</label></div>
        <div class="day-toggle"><input type="checkbox" id="d3" value="3"><label for="d3">Do</label></div>
        <div class="day-toggle"><input type="checkbox" id="d4" value="4"><label for="d4">Fr</label></div>
        <div class="day-toggle"><input type="checkbox" id="d5" value="5"><label for="d5">Sa</label></div>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeModal('newUserModal')">Abbrechen</button>
      <button class="btn-primary" onclick="createUser()">Anlegen</button>
    </div>
  </div>
</div>

<!-- Day Details Modal -->
<div class="modal-overlay" id="dayDetailModal">
  <div class="modal">
    <h2 id="dayDetailTitle">Tag</h2>
    <div id="dayDetailContent"></div>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeModal('dayDetailModal')">Schließen</button>
    </div>
  </div>
</div>

<script>
// ── State ─────────────────────────────────────────────────────────────────────
const STORAGE_KEY = 'trainings_tracker_v1';
const YEAR = new Date().getFullYear();
const AVATARS = ['#4f9cf9','#34d399','#f87171','#fbbf24','#a78bfa','#fb923c','#e879f9','#2dd4bf'];
const WEEKDAYS = ['Mo','Di','Mi','Do','Fr','Sa','So'];
const DEFAULT_FERIEN = [
  {name:'Weihnachtsferien/Neujahr', start:`${YEAR}-01-01`, end:`${YEAR}-01-06`},
  {name:'Frühjahrsferien',          start:`${YEAR}-02-16`, end:`${YEAR}-02-20`},
  {name:'Osterferien',              start:`${YEAR}-03-30`, end:`${YEAR}-04-10`},
  {name:'Pfingstferien',            start:`${YEAR}-05-26`, end:`${YEAR}-06-05`},
  {name:'Sommerferien',             start:`${YEAR}-08-03`, end:`${YEAR}-09-14`},
  {name:'Herbstferien',             start:`${YEAR}-11-02`, end:`${YEAR}-11-06`},
  {name:'Weihnachtsferien',         start:`${YEAR}-12-24`, end:`${YEAR}-12-31`},
  {name:'Heilige Drei Könige',      start:`${YEAR}-01-06`, end:`${YEAR}-01-06`},
  {name:'Karfreitag',               start:`${YEAR}-04-03`, end:`${YEAR}-04-03`},
  {name:'Ostermontag',              start:`${YEAR}-04-06`, end:`${YEAR}-04-06`},
  {name:'Maifeiertag',              start:`${YEAR}-05-01`, end:`${YEAR}-05-01`},
  {name:'Pfingstmontag',            start:`${YEAR}-05-25`, end:`${YEAR}-05-25`},
  {name:'1. Weihnachtstag',         start:`${YEAR}-12-25`, end:`${YEAR}-12-25`},
];
let state = { users: [], activeUserId: null };
let currentTab = 'dashboard';

// ── Toast ─────────────────────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// ── Storage ───────────────────────────────────────────────────────────────────
function loadState() {
  try {
    const s = localStorage.getItem(STORAGE_KEY);
    if (s) state = JSON.parse(s);
  } catch(e) {}
}

// FIX 1: saveState is now wrapped in try-catch so a storage error never
// crashes the calling function and blocks the UI from updating.
function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    return true;
  } catch(e) {
    console.warn('localStorage nicht verfügbar:', e);
    return false;
  }
}

// ── Seed data ─────────────────────────────────────────────────────────────────
function seedDefaultUser() {
  if (state.users.length > 0) return;
  const user = {
    id: 'user_1',
    name: 'Mein Profil',
    kontingent: 320,
    hoursPerSession: 3,
    trainDays: [0,1,4],
    color: AVATARS[0],
    ferien: JSON.parse(JSON.stringify(DEFAULT_FERIEN)),
    log: [
      {id:'l1',  date:'2026-01-09', gruppe:'LGNK',      halle:'Element',         hours:3},
      {id:'l2',  date:'2026-01-12', gruppe:'LGUSCKade', halle:'Element',         hours:3},
      {id:'l3',  date:'2026-01-13', gruppe:'LGNK',      halle:'Element',         hours:3},
      {id:'l4',  date:'2026-01-16', gruppe:'LGNK',      halle:'Element',         hours:3},
      {id:'l5',  date:'2026-01-20', gruppe:'LGNK',      halle:'Element',         hours:3},
      {id:'l6',  date:'2026-01-23', gruppe:'LGNK',      halle:'Element',         hours:3},
      {id:'l7',  date:'2026-01-26', gruppe:'LGUSCKade', halle:'Element',         hours:3},
      {id:'l8',  date:'2026-01-27', gruppe:'LGNK',      halle:'Element',         hours:3},
      {id:'l9',  date:'2026-01-30', gruppe:'LGNK',      halle:'Element',         hours:3},
      {id:'l10', date:'2026-02-02', gruppe:'LGUSCKade', halle:'Boulderwelt Ost', hours:3},
      {id:'l11', date:'2026-02-03', gruppe:'LGNK',      halle:'Element',         hours:3},
      {id:'l12', date:'2026-02-09', gruppe:'LGUSCKade', halle:'Element',         hours:3},
      {id:'l13', date:'2026-02-10', gruppe:'LGNK',      halle:'Element',         hours:3},
      {id:'l14', date:'2026-02-13', gruppe:'LGNK',      halle:'Element',         hours:3},
      {id:'l15', date:'2026-02-24', gruppe:'LGNK',      halle:'Element',         hours:3},
      {id:'l16', date:'2026-02-27', gruppe:'LGNK',      halle:'Element',         hours:3},
      {id:'l17', date:'2026-03-02', gruppe:'LGUSCKade', halle:'Freimann',        hours:3},
      {id:'l18', date:'2026-03-03', gruppe:'LGNK',      halle:'Thalkirchen',     hours:3},
      {id:'l19', date:'2026-03-06', gruppe:'LGNK',      halle:'Freimann',        hours:3},
      {id:'l20', date:'2026-03-09', gruppe:'LGUSCKade', halle:'Freimann',        hours:3},

// ── Date helpers ──────────────────────────────────────────────────────────────
function toISO(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function monthIndexFromISO(dateStr) {
  const month = Number(dateStr.slice(5, 7));
  return Number.isFinite(month) ? month - 1 : -1;
}
function isFerien(dateStr, ferien) {
  for (const f of ferien) {
    if (dateStr >= f.start && dateStr <= f.end) return f.name;
  }
  return null;
}
function addDays(d, n) { const r = new Date(d); r.setDate(r.getDate()+n); return r; }
function today() { return toISO(new Date()); }
function normalizeTrainings(user) {
  if (Array.isArray(user.trainings) && user.trainings.length > 0) {
    user.trainings = user.trainings
      .map((t, idx) => ({
        id: t.id || `tr_${idx}_${Date.now()}`,
        label: (t.label || 'Training').trim(),
        wd: Number.isInteger(t.wd) ? t.wd : 0,
        sollHours: Number.isFinite(Number(t.sollHours)) && Number(t.sollHours) > 0 ? Number(t.sollHours) : (user.hoursPerSession || 3)
      }))
      .filter(t => t.wd >= 0 && t.wd <= 5);
    if (user.trainings.length > 0) return user.trainings;
  }
  const fallbackDays = Array.isArray(user.trainDays) && user.trainDays.length ? user.trainDays : [0,1,4];
  user.trainings = fallbackDays.map((wd, idx) => ({
    id: `tr_${idx}_${Date.now()}`,
    label: `Training ${idx+1}`,
    wd,
    sollHours: user.hoursPerSession || 3
  }));
  return user.trainings;
}
function defaultLogHours(user) {
  const trainings = normalizeTrainings(user);
  return trainings[0]?.sollHours || user.hoursPerSession || 3;
}

// ── Compute Soll-Kalender ─────────────────────────────────────────────────────
function computeKalender(user) {
  const rows = [];
  const trainings = normalizeTrainings(user);
  let d = new Date(YEAR, 0, 1);
  const end = new Date(YEAR, 11, 31);
  let kum = 0;
  while (d <= end) {
    const dow = d.getDay();
    const wd = dow === 0 ? 6 : dow - 1;
    const ds = toISO(d);
    const dayTrainings = trainings.filter(t => t.wd === wd);
    if (dayTrainings.length) {
      dayTrainings.forEach(t => {
        const ferienName = isFerien(ds, user.ferien);
        const zaehlt = !ferienName;
        if (zaehlt) kum += t.sollHours;
        rows.push({ date: ds, wd, zaehlt, ferienName, kum, sollHours: t.sollHours, trainingLabel: t.label });
      });
    }
    d = addDays(d, 1);
  }
  return rows;
}
function computeStats(user) {
  const kal = computeKalender(user);
  const todayStr = today();
  const logDates = new Set(user.log.map(l => l.date));
  const istTotal = user.log.reduce((s,l) => s+l.hours, 0);
  const totalSoll = kal.filter(r=>r.zaehlt).reduce((s,r)=>s+r.sollHours, 0) || 0;
  const puffer = totalSoll - user.kontingent;
  const sollHeute = kal.filter(r=>r.zaehlt && r.date <= todayStr).reduce((s,r)=>s+r.sollHours, 0);
  const missed = kal.filter(r=>r.zaehlt && r.date < todayStr && !logDates.has(r.date));
  const diff = istTotal - sollHeute;
  const pufferRest = puffer + diff;
  return { kal, istTotal, totalSoll, sollHeute, diff, puffer, pufferRest, missed, logDates };
}

// ── Soll-Kalender ─────────────────────────────────────────────────────────────
function renderKalender(user, stats) {
  const {kal, logDates} = stats;
  const todayStr = today();
  const months = ['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];
  const monthBlocks = months.map((mname, mi) => {
    const firstDay = new Date(YEAR, mi, 1);
    const startWd = firstDay.getDay() === 0 ? 6 : firstDay.getDay() - 1;
    const daysInMonth = new Date(YEAR, mi+1, 0).getDate();
    const dayMap = {};
    kal.filter(r => monthIndexFromISO(r.date) === mi).forEach(r => {
      const day = parseInt(r.date.slice(8));
      if (r.ferienName)           dayMap[day] = {type:'ferien', label:r.ferienName.split('/')[0].split(' ')[0]};
      else if (r.date > todayStr) dayMap[day] = {type:'future'};
      else if (logDates.has(r.date)) dayMap[day] = {type:'done'};
      else                        dayMap[day] = {type:'missed'};
    });
    const mSoll   = kal.filter(r=>r.zaehlt && monthIndexFromISO(r.date)===mi).reduce((s,r)=>s+r.sollHours,0);
    const mIst    = user.log.filter(l=>monthIndexFromISO(l.date)===mi).reduce((s,l)=>s+l.hours,0);
    const mDone   = kal.filter(r=>r.zaehlt && r.date<=todayStr && logDates.has(r.date) && monthIndexFromISO(r.date)===mi).length;
    const mMissed = kal.filter(r=>r.zaehlt && r.date<todayStr && !logDates.has(r.date) && monthIndexFromISO(r.date)===mi).length;
    const mFuture = kal.filter(r=>r.zaehlt && r.date>todayStr && monthIndexFromISO(r.date)===mi).length;
    const hasFer  = kal.some(r=>r.ferienName && monthIndexFromISO(r.date)===mi);
    const WD_LABELS = ['Mo','Di','Mi','Do','Fr','Sa','So'];
    const headers = WD_LABELS.map(d=>`<div style="font-size:10px;font-family:var(--mono);color:var(--text3);text-align:center;padding:2px 0;font-weight:500">${d}</div>`).join('');
    let cells = '';
    for (let i=0; i<startWd; i++) cells += `<div></div>`;
    for (let day=1; day<=daysInMonth; day++) {
      const ds = `${YEAR}-${String(mi+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
      const dow = new Date(YEAR, mi, day).getDay();
      const wd  = dow === 0 ? 6 : dow - 1;
      const isWeekend = wd >= 5;
      const info = dayMap[day];
      const isToday = ds === todayStr;
      let bg='', color='', border='', fw='400';
      if (isToday) border = 'box-shadow:inset 0 0 0 1.5px var(--accent)';
      if (!info) { bg = isWeekend ? 'rgba(255,255,255,0.02)' : 'transparent'; color = 'var(--text3)'; }
      else if (info.type==='ferien')  { bg='rgba(251,191,36,0.12)'; color='var(--amber)'; }
      else if (info.type==='done')    { bg='rgba(52,211,153,0.12)'; color='var(--green)'; fw='600'; }
      else if (info.type==='missed')  { bg='rgba(248,113,113,0.12)'; color='var(--red)'; fw='600'; }
      else if (info.type==='future')  { bg='rgba(79,156,249,0.08)'; color='var(--accent)'; }
      cells += `<button type="button" class="cal-day" onclick="openDayDetails('${user.id}','${ds}')" style="background:${bg};color:${color};font-weight:${fw};border-radius:5px;text-align:center;padding:4px 2px;font-size:12px;font-family:var(--mono);${border}" title="${info?.type==='done'?'✓ geleistet':info?.type==='missed'?'✗ ausgefallen':info?.type==='ferien'?info.label:info?.type==='future'?'ausstehend':'Kein Soll-Termin'}">${day}</button>`;
    }
    const diffColor = mSoll===0?'var(--text3)':mIst>=mSoll?'var(--green)':'var(--red)';
    const diffVal   = mSoll===0?'–':(mIst-mSoll>=0?'+':'')+(mIst-mSoll)+'h';
    return `
      <div style="background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:16px;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
          <span style="font-size:13px;font-weight:600;color:var(--text)">${mname}</span>
          <div style="display:flex;gap:10px;font-size:11px;font-family:var(--mono)">
            ${mDone>0?`<span style="color:var(--green)">✓ ${mDone}</span>`:''}
            ${mMissed>0?`<span style="color:var(--red)">✗ ${mMissed}</span>`:''}
            ${mFuture>0?`<span style="color:var(--accent)">◦ ${mFuture}</span>`:''}
            ${hasFer?`<span style="color:var(--amber)">⛱ Ferien</span>`:''}
            <span style="color:var(--text3)">Soll ${mSoll}h</span>
            <span style="color:${diffColor}">${diffVal}</span>
          </div>
        </div>
        <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px">${headers}${cells}</div>
      </div>`;
  }).join('');
  document.getElementById('tabContent').innerHTML = `
    <div style="display:flex;gap:16px;margin-bottom:18px;font-size:12px;color:var(--text2);align-items:center;font-family:var(--mono);flex-wrap:wrap">
      <span><span style="display:inline-block;width:12px;height:12px;border-radius:2px;background:rgba(52,211,153,.12);border:1px solid rgba(52,211,153,.3);vertical-align:middle;margin-right:4px"></span>Geleistet</span>
      <span><span style="display:inline-block;width:12px;height:12px;border-radius:2px;background:rgba(248,113,113,.12);border:1px solid rgba(248,113,113,.3);vertical-align:middle;margin-right:4px"></span>Ausgefallen</span>
      <span><span style="display:inline-block;width:12px;height:12px;border-radius:2px;background:rgba(79,156,249,.08);border:1px solid rgba(79,156,249,.2);vertical-align:middle;margin-right:4px"></span>Ausstehend</span>
      <span><span style="display:inline-block;width:12px;height:12px;border-radius:2px;background:rgba(251,191,36,.12);vertical-align:middle;margin-right:4px"></span>Ferien</span>
      <span style="margin-left:auto;color:var(--text3)">Heute: <span style="color:var(--accent)">${todayStr}</span></span>
    </div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:14px">${monthBlocks}</div>
  `;
}

      <div class="setup-card">
        <h3><span>🏖</span> Schulferien</h3>
        <div style="display:grid;grid-template-columns:1.2fr 1fr 1fr 32px;gap:6px;margin-bottom:6px">
          <span style="font-size:10px;color:var(--text3);font-family:var(--mono);text-transform:uppercase;letter-spacing:.05em">Name</span>
          <span style="font-size:10px;color:var(--text3);font-family:var(--mono);text-transform:uppercase;letter-spacing:.05em">Von</span>
          <span style="font-size:10px;color:var(--text3);font-family:var(--mono);text-transform:uppercase;letter-spacing:.05em">Bis</span>
          <span></span>
        </div>
        <div class="ferien-list" id="ferienList">${ferienItems}</div>
        <button class="btn-add-ferien" onclick="addFerien('${userId}')">+ Ferienperiode hinzufügen</button>
      </div>
    </div>
    <div class="setup-actions">
      <button class="btn-secondary" style="color:var(--red);border-color:rgba(248,113,113,.3)" onclick="deleteUser('${userId}')">Person löschen</button>
      <button class="btn-secondary" onclick="renderAll()">Abbrechen</button>
      <button class="btn-primary" onclick="saveSetup('${userId}')">Speichern</button>
    </div>
  `;

  // Attach ferien event listeners
  const ferienList = document.getElementById('ferienList');
  if (ferienList) {
    ferienList.addEventListener('change', e => {
      const el = e.target;
      const idx = parseInt(el.dataset.idx);
      if (isNaN(idx)) return;
      const u = state.users.find(u2=>u2.id===userId);
      if (!u || !u.ferien[idx]) return;
      const val = el.value.trim();
      if (!val) return;
      if (el.classList.contains('fi-name'))  u.ferien[idx].name  = val;
      if (el.classList.contains('fi-start')) { if (/^\d{4}-\d{2}-\d{2}$/.test(val)) u.ferien[idx].start = val; }
      if (el.classList.contains('fi-end'))   { if (/^\d{4}-\d{2}-\d{2}$/.test(val)) u.ferien[idx].end   = val; }
      saveState();
    });
    ferienList.addEventListener('click', e => {
      const btn = e.target.closest('.fi-del');
      if (!btn) return;
      const idx = parseInt(btn.dataset.idx);
      const u = state.users.find(u2=>u2.id===userId);
      if (!u) return;
      u.ferien.splice(idx, 1);
      saveState();
      renderSetup(userId);
    });
  }
}

function addFerien(userId) {
  const user = state.users.find(u=>u.id===userId);
  if (user) {
    user.ferien.push({name:'Neue Ferien', start:today(), end:today()});
    saveState();
    renderSetup(userId);
  }
}
function addTraining(userId) {
  const user = state.users.find(u=>u.id===userId);
  if (!user) return;
  const trainings = normalizeTrainings(user);
  trainings.push({
    id: `tr_${Date.now()}`,
    label: 'Training',
    wd: 0,
    sollHours: defaultLogHours(user)
  });
  saveState();
  renderSetup(userId);
}
function deleteTraining(userId, idx) {
  const user = state.users.find(u=>u.id===userId);
  if (!user) return;
  const trainings = normalizeTrainings(user);
  trainings.splice(idx, 1);
  if (trainings.length === 0) {
    trainings.push({ id: `tr_${Date.now()}`, label: 'Training', wd: 0, sollHours: 3 });
  }
  saveState();
  renderSetup(userId);
}
function setColor(userId, color) {
  const user = state.users.find(u=>u.id===userId);
  if (user) { user.color = color; saveState(); renderSetup(userId); renderSidebar(); }
}

// ── saveSetup – FIXED ─────────────────────────────────────────────────────────
// Fixes applied:
//   1. saveState() is already wrapped (try-catch in saveState itself), so a
//      storage failure can no longer crash this function before renderAll().
//   2. All DOM reads use null checks – a missing element can no longer throw
//      a TypeError that silently aborts the save.
//   3. startEl / endEl in the ferien loop are now guarded (were missing before).
function saveSetup(userId) {
  const user = state.users.find(u=>u.id===userId);
  if (!user) return;

  // Profile fields – safe null checks throughout
  const nameEl   = document.getElementById('s_name');
  const kontEl   = document.getElementById('s_kontingent');

  if (nameEl   && nameEl.value.trim())   user.name            = nameEl.value.trim();
  if (kontEl) {
    const k = parseFloat(kontEl.value);
    if (!isNaN(k) && k > 0)             user.kontingent      = k;
  }

  // Trainings with per-session soll hours
  const trainRows = document.querySelectorAll('#trainingList .training-item');
  if (trainRows.length > 0) {
    const parsedTrainings = [];
    trainRows.forEach((row, idx) => {
      const nameEl2 = row.querySelector('.tr-name');
      const dayEl = row.querySelector('.tr-day');
      const hoursEl2 = row.querySelector('.tr-hours');
      if (!nameEl2 || !dayEl || !hoursEl2) return;
      const label = nameEl2.value.trim() || `Training ${idx+1}`;
      const wd = parseInt(dayEl.value, 10);
      const sh = parseFloat(hoursEl2.value);
      if (!Number.isInteger(wd) || wd < 0 || wd > 5) return;
      if (!Number.isFinite(sh) || sh <= 0) return;
      parsedTrainings.push({
        id: `tr_${idx}_${Date.now()}`,
        label,
        wd,
        sollHours: sh
      });
    });
    if (parsedTrainings.length > 0) user.trainings = parsedTrainings;
  }
  normalizeTrainings(user);
  user.trainDays = [...new Set(user.trainings.map(t => t.wd))];
  user.hoursPerSession = defaultLogHours(user);

  // Ferien – FIX: guard startEl and endEl for null before accessing .value
  document.querySelectorAll('#ferienList .ferien-item').forEach(row => {
    const nameEl2 = row.querySelector('.fi-name');
    const startEl = row.querySelector('.fi-start');
    const endEl   = row.querySelector('.fi-end');
    if (!nameEl2 || !startEl || !endEl) return;   // <-- was missing; caused TypeError crash
    const idx = parseInt(nameEl2.dataset.idx);
    if (isNaN(idx) || !user.ferien[idx]) return;
    if (nameEl2.value.trim())                        user.ferien[idx].name  = nameEl2.value.trim();
    if (/^\d{4}-\d{2}-\d{2}$/.test(startEl.value)) user.ferien[idx].start = startEl.value;
    if (/^\d{4}-\d{2}-\d{2}$/.test(endEl.value))   user.ferien[idx].end   = endEl.value;
  });

  // saveState() no longer throws (try-catch inside), so renderAll() is always reached
  const ok = saveState();
  renderSetup(userId);
  showToast(ok ? 'Einstellungen gespeichert' : 'Speichern fehlgeschlagen');
}

function deleteUser(userId) {
  if (!confirm('Person wirklich löschen?')) return;
  state.users = state.users.filter(u=>u.id!==userId);
  if (state.activeUserId===userId) state.activeUserId = state.users[0]?.id || null;
  saveState(); renderAll();
}

// ── Log actions ───────────────────────────────────────────────────────────────
function addLog(userId) {
  const user = state.users.find(u=>u.id===userId);
  if (!user) return;
  const date   = document.getElementById('lf_date').value;
  const training = document.getElementById('lf_training').value;
  const halle  = document.getElementById('lf_halle').value.trim();
  const hours  = parseFloat(document.getElementById('lf_hours').value);
  if (!date || !training || !Number.isFinite(hours) || hours <= 0) {
    showToast('Bitte gueltige Stunden > 0 eintragen');
    return;
  }
  user.log.push({ id:'l'+Date.now(), date, training, halle, hours });
  saveState(); renderAll();
}
function deleteLog(userId, logId) {
  const user = state.users.find(u=>u.id===userId);
  if (!user) return;
  user.log = user.log.filter(l=>l.id!==logId);
  saveState(); renderAll();
}

function openDayDetails(userId, dateStr) {
  const user = state.users.find(u=>u.id===userId);
  if (!user) return;
  const dayLogs = [...user.log]
    .filter(l => l.date === dateStr)
    .sort((a, b) => b.id.localeCompare(a.id));
  const dayRows = computeKalender(user).filter(r => r.date === dateStr);
  const titleDate = new Date(`${dateStr}T12:00:00`).toLocaleDateString('de-DE', {
    weekday: 'long',
    day: '2-digit',
    month: '2-digit',
    year: 'numeric'
  });
  const todayStr = today();
  let statusText = 'Kein Soll-Trainingstag';
  let statusColor = 'var(--text2)';
  const daySoll = dayRows.filter(r=>r.zaehlt).reduce((s,r)=>s+r.sollHours,0);
  const labels = [...new Set(dayRows.map(r=>r.trainingLabel).filter(Boolean))];
  const labelText = labels.length ? ` (${labels.join(', ')})` : '';
  if (dayRows.some(r => r.ferienName)) {
    statusText = `Ferien: ${dayRows.find(r => r.ferienName)?.ferienName || 'Ferien'}${labelText}`;
    statusColor = 'var(--amber)';
  } else if (dayRows.length > 0 && dateStr > todayStr) {
    statusText = `Ausstehender Soll-Termin · ${daySoll}h${labelText}`;
    statusColor = 'var(--accent)';
  } else if (dayRows.length > 0 && dayLogs.length > 0) {
    statusText = `Geleistet · Soll ${daySoll}h${labelText}`;
    statusColor = 'var(--green)';
  } else if (dayRows.length > 0) {
    statusText = `Ausgefallen (kein Log-Eintrag) · Soll ${daySoll}h${labelText}`;
    statusColor = 'var(--red)';
  }
  const logsHtml = dayLogs.length
    ? dayLogs.map(l => `
      <div class="day-log-card">
        <div class="day-log-meta">
          <strong>${l.training || l.gruppe || 'Training'}</strong>
          <span>${l.hours}h</span>
        </div>
        <div class="day-log-halle">${l.halle || 'Halle nicht gesetzt'}</div>
      </div>
    `).join('')
    : `<div class="day-log-card"><div class="day-log-halle">Kein Trainingslog-Eintrag für dieses Datum.</div></div>`;
  document.getElementById('dayDetailTitle').textContent = titleDate;
  document.getElementById('dayDetailContent').innerHTML = `
    <div style="font-size:12px;color:var(--text3);font-family:var(--mono);margin-bottom:8px">Status im Soll-Kalender</div>
    <div style="font-size:14px;color:${statusColor};font-weight:600">${statusText}</div>
    <div class="cal-day-details">
      <div style="font-size:12px;color:var(--text3);font-family:var(--mono);text-transform:uppercase;letter-spacing:.05em">Trainingslog</div>
      ${logsHtml}
    </div>
  `;
  document.getElementById('dayDetailModal').classList.add('open');
}

// ── New user modal ────────────────────────────────────────────────────────────
function openNewUserModal() {
  document.getElementById('nu_name').value = '';
  document.getElementById('nu_kontingent').value = '320';
  document.getElementById('nu_hours').value = '3';
  document.querySelectorAll('#nu_days input').forEach(cb=>cb.checked=false);
  document.getElementById('newUserModal').classList.add('open');
}
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
function createUser() {
  const name = document.getElementById('nu_name').value.trim();
  if (!name) return;
  const trainDays  = Array.from(document.querySelectorAll('#nu_days input')).filter(cb=>cb.checked).map(cb=>parseInt(cb.value));
  const defaultHours = parseFloat(document.getElementById('nu_hours').value)||3;
  const normalizedTrainDays = trainDays.length ? trainDays : [0,1,4];
  const trainings = normalizedTrainDays.map((wd, idx) => ({
    id: `tr_${Date.now()}_${idx}`,
    label: `Training ${idx+1}`,
    wd,
    sollHours: defaultHours
  }));
  const user = {
    id: 'user_'+Date.now(),
    name,
    kontingent: parseFloat(document.getElementById('nu_kontingent').value)||320,
    hoursPerSession: defaultHours,
    trainDays: normalizedTrainDays,
    color: AVATARS[state.users.length % AVATARS.length],
    trainings,
    ferien: JSON.parse(JSON.stringify(DEFAULT_FERIEN)),
    log: []
  };
  state.users.push(user);
  state.activeUserId = user.id;
  saveState();
  closeModal('newUserModal');
  renderAll();
}
document.getElementById('newUserModal').addEventListener('click', function(e) {
  if (e.target === this) closeModal('newUserModal');
});
document.getElementById('dayDetailModal').addEventListener('click', function(e) {
  if (e.target === this) closeModal('dayDetailModal');
});

// ── Reset ─────────────────────────────────────────────────────────────────────
function resetApp() {
  if (!confirm('Alle Daten löschen und App zurücksetzen?')) return;
  try { localStorage.removeItem(STORAGE_KEY); } catch(e) {}
  state = { users: [], activeUserId: null };
  seedDefaultUser();
  renderAll();
}

// ── Init ──────────────────────────────────────────────────────────────────────
loadState();
seedDefaultUser();
renderAll();
</script>
</body>
</html>
